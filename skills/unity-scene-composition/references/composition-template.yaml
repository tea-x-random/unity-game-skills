schema: unity-game-skills.composition.v1
style_id: cozy_toy_diorama_v1   # MUST equal art-spec.yaml style_id (canonical form <preset>_v<N>)
camera_profile:
  profile_id: gameplay_iso_ortho_v1
  projection: orthographic
  yaw: 45
  pitch: 35
  orthographic_size: 6.5
  lens: null
  target_aspect: portrait_9_19_5
  target_resolution: [1170, 2532]
  framing: hero_object_lower_third_with_play_path_centered
  safe_area_margin_percent: 5

visual_layers:
  background:
    z_range: [20, 50]
    contrast: low
    detail_density: low
    saturation: low
    may_occlude_gameplay: false
  far:
    z_range: [10, 20]
    contrast: low
    detail_density: low_medium
    may_occlude_gameplay: false
  midground:
    z_range: [1, 10]
    contrast: medium
    detail_density: medium
    may_occlude_gameplay: false
  gameplay:
    z_range: [-1, 1]
    contrast: high
    detail_density: controlled
    may_occlude_gameplay: false
  foreground:
    z_range: [-10, -1]
    contrast: medium
    detail_density: low
    max_occlusion_percent: 8
  ui:
    z_range: overlay
    contrast: high
    safe_area_required: true

focal_path:
  first_read: primary_gameplay_goal
  second_read: next_action_or_reward
  third_read: world_flavor
  forbidden_first_reads: [background_detail, filler_props, decorative_vfx]

shape_rhythm:
  big_shapes_per_screen: [1, 2]
  medium_shapes_per_screen: [3, 6]
  small_shapes_per_screen: [6, 18]
  min_silhouette_spacing_percent: 3
  target_screen_height_percent:
    hero: [22, 35]
    primary_gameplay: [12, 22]
    support_prop: [6, 16]
    filler_prop: [2, 8]

scale_normalization:
  enforce_target_screen_height_percent: true
  reject_equal_weight_sticker_pile: true
  default_role_heights_percent:
    hero: 28
    primary_gameplay: 16
    support_prop: 10
    filler_prop: 5

density_budget:
  max_density_cost_per_screen: 24
  max_interesting_objects_per_screen: 12
  max_prop_families_per_screen: 4
  quiet_zone_min_percent: 30

color_zones:
  gameplay_path:
    saturation: medium_low
    contrast: medium
    reserved_accent_colors: []
  rewards_and_interactables:
    saturation: high
    contrast: high
    reserved_accent_colors: [accent_gold, accent_blue]
  background:
    saturation: low
    contrast: low

occlusion_budget:
  gameplay_area_max_percent: 8
  critical_path_max_percent: 0
  ui_safe_area_max_percent: 0
  foreground_allowed: true

# Sprite / 2.5D scenes only — set the whole block to null for pure-3D games (Rule 0: one pixel density).
pixel_density:
  one_pixel_density: true          # ground texels-per-unit ≈ project PPU (art-spec craft.pixels_per_unit); measured, see scene-measurement.md
  texel_tolerance_percent: 20      # allowed |texels_per_unit - PPU| / PPU before the measured gate fails
  light_model: unlit_uniform       # unlit_uniform | lit_uniform — sprites and 3D ground share ONE light model
  billboard_axis: y_only           # sprites yaw to camera, never pitch
  sprite_pivot: bottom_center      # feet pivot; actors placed at ground y=0

shadow_and_contact:
  key_light_direction: upper_left  # MUST equal art-spec craft.light_direction
  shadow_direction: lower_right
  shadow_softness: soft
  contact_darkening_strength: medium
  blob_shadow_profile: soft_blob_v1
  required_for_layers: [midground, gameplay, foreground]
  forbid_baked_png_shadows: true

family_distribution:
  meadow_vegetation:
    allowed_layers: [midground, foreground]
    per_screen_count: [2, 5]
    max_variants_visible: 3
  meadow_rocks:
    allowed_layers: [midground, gameplay]
    per_screen_count: [1, 4]
    max_variants_visible: 2

screenshot_tests:
  required_scenes: [BeautyCell_01, CameraScaleTest, LightingTest, MaterialTest, MobileDeviceTest]
  required_aspects: [portrait_9_19_5, tablet_4_3]
  # Deterministic gates — computed from Unity scene data via MCP (references/scene-measurement.md).
  # A violation is a hard failure: move/remove assets, never argue with the number.
  measured_acceptance:
    density_within_budget: true
    occlusion_within_budget: true
    screen_heights_within_role_ranges: true
    camera_contracts_match: true
    no_unapproved_assets: true     # every visible renderer resolves to a registry entry (or flagged placeholder)
    one_pixel_density: true        # sprite/2.5D only; null when pixel_density block is null
  # Qualitative dimensions — critique_image.py scene mode (unity-image-generator) vs the golden screen.
  # Calibration period: low scores trigger re-roll/manual review, NOT a hard block.
  scored_acceptance:
    gameplay_first_read: true
    layer_contrast_reads: true
    grounding_consistent: true
    scene_cohesion: true
